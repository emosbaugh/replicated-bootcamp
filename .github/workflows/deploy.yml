name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
    secrets: inherit

  scan:
    needs: [docker]
    uses: ./.github/workflows/image-scan.yml
    permissions:
      packages: read
    with:
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
    secrets: inherit

  vars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      image-tag: ${{ steps.vars.outputs.image-tag }}
      channel: ${{ steps.vars.outputs.channel }}
    steps:
      - name: Set version and channel
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
            VERSION="${IMAGE_TAG#v}"
            CHANNEL="Stable"
          else
            CALVER=$(date -u +"%Y.%-m.%-d")
            VERSION="${CALVER}-main.${{ github.run_number }}"
            IMAGE_TAG="main"
            CHANNEL="Unstable"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

  release:
    needs: [docker, scan, vars]
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.vars.outputs.version }}
      image-tag: ${{ needs.vars.outputs.image-tag }}
      channel: ${{ needs.vars.outputs.channel }}
    secrets:
      replicated-api-token: ${{ secrets.REPLICATED_API_TOKEN }}
