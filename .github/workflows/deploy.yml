name: Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
    secrets: inherit

  scan:
    needs: [docker]
    uses: ./.github/workflows/image-scan.yml
    permissions:
      packages: read
    with:
      tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main' }}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [docker, scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set version and channel
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            IMAGE_TAG="${{ github.ref_name }}"
            VERSION="${IMAGE_TAG#v}"
            CHANNEL="Stable"
          else
            CALVER=$(date -u +"%Y.%-m.%-d")
            VERSION="${CALVER}-main.${{ github.run_number }}"
            IMAGE_TAG="main"
            CHANNEL="Unstable"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Install Replicated CLI
        run: |
          version=$(curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep -m1 -Po '"tag_name":\s*"v\K[^"]+')
          curl -Ls "https://github.com/replicatedhq/replicated/releases/download/v${version}/replicated_${version}_linux_amd64.tar.gz" \
            -o replicated.tar.gz
          tar xf replicated.tar.gz replicated && rm replicated.tar.gz
          sudo mv replicated /usr/local/bin/replicated

      - name: Package charts
        run: make package-charts VERSION="${{ steps.vars.outputs.version }}" IMAGE_TAG="${{ steps.vars.outputs.image-tag }}"

      - name: Create and promote Replicated release
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: replicated release create --version "${{ steps.vars.outputs.version }}" --promote "${{ steps.vars.outputs.channel }}"
