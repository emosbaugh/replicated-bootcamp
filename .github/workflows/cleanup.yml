name: Cleanup Stale CI Resources

on:
  schedule:
    - cron: '0 3 * * *'  # daily at 3am UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Install Replicated CLI
        run: |
          version=$(curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep -m1 -Po '"tag_name":\s*"v\K[^"]+')
          curl -Ls "https://github.com/replicatedhq/replicated/releases/download/v${version}/replicated_${version}_linux_amd64.tar.gz" \
            -o replicated.tar.gz
          tar xf replicated.tar.gz replicated && rm replicated.tar.gz
          sudo mv replicated /usr/local/bin/replicated

      - name: Get app ID
        id: app
        run: |
          APP_ID=$(replicated api get /v3/apps \
            --token ${{ secrets.REPLICATED_API_TOKEN }} \
            | jq -r '.apps[] | select(.slug == "playball-exe") | .id')
          echo "id=$APP_ID" >> $GITHUB_OUTPUT

      - name: Archive stale CI customers
        run: |
          CUTOFF=$(date -d '7 days ago' +%s)
          APP_ID="${{ steps.app.outputs.id }}"
          replicated api get /v3/app/${APP_ID}/customers \
            --token ${{ secrets.REPLICATED_API_TOKEN }} \
            | jq -r '.customers[] | select(.name | startswith("ci-")) | .id' \
            | while read -r customer_id; do
                CREATED=$(replicated api get /v3/app/${APP_ID}/customer/${customer_id} \
                  --token ${{ secrets.REPLICATED_API_TOKEN }} \
                  | jq -r '.customer.createdAt')
                CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
                if [ "$CREATED_TS" -lt "$CUTOFF" ]; then
                  echo "Archiving customer $customer_id (created $CREATED)"
                  replicated api put /v3/app/${APP_ID}/customer/${customer_id}/archive \
                    --token ${{ secrets.REPLICATED_API_TOKEN }} \
                    --body '{}' || echo "Failed to archive customer $customer_id, skipping"
                fi
              done

      - name: Archive stale pr-* channels
        run: |
          CUTOFF=$(date -d '7 days ago' +%s)
          APP_ID="${{ steps.app.outputs.id }}"
          replicated api get /v3/app/${APP_ID}/channels \
            --token ${{ secrets.REPLICATED_API_TOKEN }} \
            | jq -r '.channels[] | select(.name | startswith("pr-")) | .id' \
            | while read -r channel_id; do
                CREATED=$(replicated api get /v3/app/${APP_ID}/channel/${channel_id} \
                  --token ${{ secrets.REPLICATED_API_TOKEN }} \
                  | jq -r '.channel.created')
                CREATED_TS=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
                if [ "$CREATED_TS" -lt "$CUTOFF" ]; then
                  echo "Archiving channel $channel_id (created $CREATED)"
                  replicated api put /v3/app/${APP_ID}/channel/${channel_id}/archive \
                    --token ${{ secrets.REPLICATED_API_TOKEN }} \
                    --body '{}' || echo "Failed to archive channel $channel_id, skipping"
                fi
              done
