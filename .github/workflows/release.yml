name: Release

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      image-tag:
        required: true
        type: string
      channel:
        required: true
        type: string
    secrets:
      replicated-api-token:
        required: true
    outputs:
      channel-slug:
        description: Slug of the promoted channel
        value: ${{ jobs.release.outputs.channel-slug }}
      version:
        description: The release version
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      channel-slug: ${{ steps.channel.outputs.slug }}
      version: ${{ steps.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          version=$(curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep -m1 -Po '"tag_name":\s*"v\K[^"]+')
          curl -Ls "https://github.com/replicatedhq/replicated/releases/download/v${version}/replicated_${version}_linux_amd64.tar.gz" \
            -o replicated.tar.gz
          tar xf replicated.tar.gz replicated && rm replicated.tar.gz
          sudo mv replicated /usr/local/bin/replicated

      - name: Package charts
        run: make package-charts VERSION="${{ inputs.version }}" IMAGE_TAG="${{ inputs.image-tag }}"

      - name: Bundle EC3 extension charts
        run: make bundle-extensions

      - name: Create and promote Replicated release
        id: create-release
        env:
          REPLICATED_API_TOKEN: ${{ secrets.replicated-api-token }}
        run: |
          # release create reads .replicated config and automatically runs helm dependency update + helm package
          replicated release create --version "${{ inputs.version }}" --promote "${{ inputs.channel }}"
          echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Discover channel properties
        id: channel
        env:
          REPLICATED_API_TOKEN: ${{ secrets.replicated-api-token }}
        run: |
          CHANNEL=$(replicated channel ls --app playball-exe --output json \
            | jq --arg name "${{ inputs.channel }}" '.[] | select(.name == $name)')
          echo "slug=$(echo "$CHANNEL"    | jq -r '.channelSlug')"     >> $GITHUB_OUTPUT
          echo "id=$(echo "$CHANNEL"      | jq -r '.id')"              >> $GITHUB_OUTPUT
          echo "sequence=$(echo "$CHANNEL" | jq -r '.channelSequence')" >> $GITHUB_OUTPUT
          echo "app-id=$(echo "$CHANNEL"  | jq -r '.appId')"           >> $GITHUB_OUTPUT

      - name: Trigger airgap bundle build
        env:
          REPLICATED_API_TOKEN: ${{ secrets.replicated-api-token }}
        run: |
          replicated api post /v3/app/${{ steps.channel.outputs.app-id }}/channel/${{ steps.channel.outputs.id }}/release/${{ steps.channel.outputs.sequence }}/airgap/build \
            -b '{}'
