name: Build and Test

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      skip-e2e: ${{ steps.filter.outputs.only_changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: tj-actions/changed-files@v47
        id: filter
        with:
          files: |
            **/*.md
            docs/**
            renovate.json

  build:
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      tag: pr-${{ github.event.pull_request.number }}
    secrets: inherit

  scan:
    needs: [build]
    uses: ./.github/workflows/image-scan.yml
    permissions:
      packages: read
    with:
      tag: pr-${{ github.event.pull_request.number }}
      fail-build: false
    secrets: inherit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Replicated CLI
        run: |
          version=$(curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep -m1 -Po '"tag_name":\s*"v\K[^"]+')
          curl -Ls "https://github.com/replicatedhq/replicated/releases/download/v${version}/replicated_${version}_linux_amd64.tar.gz" \
            -o replicated.tar.gz
          tar xf replicated.tar.gz replicated && rm replicated.tar.gz
          sudo mv replicated /usr/local/bin/replicated

      - name: Helm lint
        run: make helm-lint

      - name: Replicated release lint
        run: make replicated-lint
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}

  release:
    needs: [build, scan, test, lint]
    uses: ./.github/workflows/release.yml
    with:
      version: "0.1.0-pr.${{ github.event.pull_request.number }}.${{ github.run_number }}"
      image-tag: pr-${{ github.event.pull_request.number }}
      channel: pr-${{ github.event.pull_request.number }}
    secrets:
      replicated-api-token: ${{ secrets.REPLICATED_API_TOKEN }}

  e2e:
    needs: [release, changes]
    if: needs.changes.outputs.skip-e2e != 'true'
    uses: ./.github/workflows/e2e.yml
    with:
      image-tag: pr-${{ github.event.pull_request.number }}
      pr-number: ${{ github.event.pull_request.number }}
      channel-slug: ${{ needs.release.outputs.channel-slug }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  e2e-ec3:
    needs: [release, changes]
    if: needs.changes.outputs.skip-e2e != 'true'
    uses: ./.github/workflows/e2e-ec3.yml
    with:
      image-tag: pr-${{ github.event.pull_request.number }}
      pr-number: ${{ github.event.pull_request.number }}
      channel-slug: ${{ needs.release.outputs.channel-slug }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  e2e-ec3-airgap:
    needs: [release, changes]
    if: needs.changes.outputs.skip-e2e != 'true'
    uses: ./.github/workflows/e2e-ec3-airgap.yml
    with:
      image-tag: pr-${{ github.event.pull_request.number }}
      pr-number: ${{ github.event.pull_request.number }}
      channel-slug: ${{ needs.release.outputs.channel-slug }}
      version: ${{ needs.release.outputs.version }}
    secrets: inherit

  ci-gate:
    runs-on: ubuntu-latest
    needs: [build, e2e, e2e-ec3, e2e-ec3-airgap]
    if: ${{ !cancelled() }}
    steps:
      - name: Check required jobs
        run: |
          results=(
            "build=${{ needs.build.result }}"
            "e2e=${{ needs.e2e.result }}"
            "e2e-ec3=${{ needs.e2e-ec3.result }}"
            "e2e-ec3-airgap=${{ needs.e2e-ec3-airgap.result }}"
          )
          failed=false
          for entry in "${results[@]}"; do
            name="${entry%%=*}"
            result="${entry##*=}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAIL: $name=$result"
              failed=true
            else
              echo "OK:   $name=$result"
            fi
          done
          $failed && exit 1 || exit 0

  archive-channel:
    needs: [release, e2e, e2e-ec3, e2e-ec3-airgap]
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: replicatedhq/replicated-actions/archive-channel@v1
        with:
          app-slug: playball-exe
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.release.outputs.channel-slug }}
