apiVersion: embeddedcluster.replicated.com/v1beta1
kind: Config
metadata:
  name: playball-exe
# Versions below are overridden at build time from deploy/versions.env.
# Do not edit these manually — update versions.env instead.
spec:
  version: "0.0.0"
  domains:
    proxyRegistryDomain: images.emosbaugh.be
  extensions:
    helmCharts:
      - chart:
          name: cert-manager
          chartVersion: "0.0.0"
        releaseName: cert-manager
        namespace: cert-manager
        weight: 10
        values:
          image:
            repository: '{{repl ReplicatedImageName (HelmValue ".image.repository") }}'
          cainjector:
            image:
              repository: '{{repl ReplicatedImageName (HelmValue ".cainjector.image.repository") }}'
          webhook:
            image:
              repository: '{{repl ReplicatedImageName (HelmValue ".webhook.image.repository") }}'
          startupapicheck:
            image:
              repository: '{{repl ReplicatedImageName (HelmValue ".startupapicheck.image.repository") }}'
          crds:
            enabled: true
      - chart:
          name: traefik
          chartVersion: "0.0.0"
        releaseName: traefik
        namespace: traefik
        values:
          image:
            registry: '{{repl ReplicatedImageRegistry (HelmValue ".image.registry") }}'
          service:
            type: NodePort
          ports:
            web:
              port: 8000
              expose:
                default: true
              exposedPort: 80
              nodePort: 80
              http:
                redirections:
                  entryPoint:
                    to: websecure
                    scheme: https
                    permanent: true
            websecure:
              port: 8443
              expose:
                default: true
              exposedPort: 443
              nodePort: 443
